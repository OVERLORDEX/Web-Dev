<div *ngIf="products.length > 0; else noProducts" class="products-container">
  <app-product-card
    *ngFor="let product of products"
    [product]="product"
    (delete)="removeProduct($event)">
  </app-product-card>
</div>

<ng-template #noProducts>
  <p class="no-products-message">No products in this category.</p>
</ng-template>
